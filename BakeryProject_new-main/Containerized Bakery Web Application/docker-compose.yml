services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: bakery_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: bakery_user
      MYSQL_PASSWORD: bakery_pass
    volumes:
      - ./db/bakery_schema.sql:/docker-entrypoint-initdb.d/bakery_schema.sql
    ports:
      - "3307:3306"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      # --- FOR LOCAL SETUP: Set DB_HOST to 'db' ---
      # --- FOR CLOUD SETUP: Set DB_HOST to your RDS Endpoint ---
      DB_HOST: bakery-db.cg38ggqq8x6r.us-east-1.rds.amazonaws.com
      DB_USER: root
      DB_PASS: admin123
      DB_NAME: bakery_db
    depends_on:
      - db
      context: ./backend-java
      dockerfile: Dockerfile
    environment:
      # REPLACE 'your-rds-endpoint' with the actual endpoint from AWS RDS Console
      # Example: bakery-db.cxyz123.us-east-1.rds.amazonaws.com
      DB_URL: jdbc:mysql://database-1.c5sqom0eklc3.eu-north-1.rds.amazonaws.com:3306/bakery_db
      DB_USER: admin
      DB_PASS: ganeshjadhav
    ports:
      - "8082:8082"
    # We REMOVED 'depends_on: db' because RDS is external, not a container.

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
